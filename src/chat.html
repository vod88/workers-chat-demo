<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
     <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" href="https://img.icons8.com/?size=100&id=ib8fvSIANhAz&format=png&color=000000" type="image/png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/?size=100&id=ib8fvSIANhAz&format=png&color=000000" type="image/png">

    <title>fcicChat</title>

<!-- Inline style to avoid an extra round trip before the page can render. -->
<style type="text/css">
  /* Global Reset and Typography */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f5f5f5; /* Light mode background */
    color: #333;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Dark Mode Styles */
  @media (prefers-color-scheme: dark) {
    body {
      background-color: #1a1a1a;
      color: #e0e0e0;
    }
    #chat-input {
      background-color: #2c2c2c;
      border-color: #444;
      color: #e0e0e0;
    }
    #chat-input:focus {
      border-color: #007aff; /* Blue accent color */
    }
    #chatroom::before {
      color: #aaa;
    }
    #roster {
      background-color: #2c2c2c;
      border-color: #444;
      color: #e0e0e0;
    }
    #name-form, #room-form {
      background-color: #1a1a1a;
    }
    #name-input, #room-name {
      background-color: #2c2c2c;
      border-color: #444;
      color: #e0e0e0;
    }
    #name-input::placeholder, #room-name::placeholder {
      color: #888;
    }
    #room-form button {
      background-color: #444;
      border-color: #555;
      color: #e0e0e0;
    }
    #room-form button:hover {
      background-color: #555;
    }
  }

  /* Chat Log Layout */
  #chatlog {
    position: fixed;
    top: 0;
    bottom: 32px; /* Height of input field */
    left: 0;
    right: 200px; /* Width of roster area */
    overflow-y: scroll; /* Use standard scrollbar */
    padding: 16px;
    padding-bottom: 8px;
    overflow-wrap: break-word;
    word-break: break-all; /* Ensure long words break */
    transition: right 0.3s ease;
  }

  /* Chat Message Styling */
  #chatlog span.username {
    font-weight: 600;
    font-size: 0.9em;
    color: #007aff; /* Blue color for username */
  }
  #chatlog p {
    margin-top: 8px;
    margin-bottom: 8px;
    line-height: 1.4;
    font-size: 0.95em;
  }
  #chatlog p:first-child {
    margin-top: 0;
  }
  #chatlog p:last-of-type {
    margin-bottom: 0;
  }
  #chatlog a {
    color: #007aff; /* Link color */
    text-decoration: none;
  }

  /* Roster Layout and Styling */
  #roster {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 32px;
    width: 200px;
    border-left: 1px solid #ddd;
    background-color: #fafafa; /* Light mode roster background */
    padding: 16px;
    overflow-y: auto;
    font-weight: 600;
    transition: width 0.3s ease;
  }
  #roster p {
    margin-top: 0;
    margin-bottom: 8px;
    font-size: 0.9em;
    color: #555;
  }

  /* Input Field Layout */
  #chatroom {
    position: relative;
  }
  #chat-input {
    position: fixed;
    width: 100%;
    height: 32px;
    bottom: 0;
    left: 0;
    border: none;
    border-top: 1px solid #ddd;
    padding-left: 40px; /* Space for the prompt icon */
    padding-right: 16px;
    outline: none;
    font-size: 1em;
    background-color: #ffffff;
    transition: border-color 0.3s ease;
  }
  #chat-input:focus {
    border-color: #007aff; /* Highlight focus state */
  }

  /* Prompt Icon Styling */
  #chatroom::before {
    z-index: 1;
    display: block;
    content: ">";
    position: fixed;
    bottom: 0;
    left: 0;
    width: 40px;
    height: 32px;
    line-height: 32px;
    text-align: center;
    font-weight: bold;
    color: #888;
    font-size: 1.1em;
  }

  /* Initial Form Styles (Name and Room Selection) */
  #name-form, #room-form {
    position: fixed;
    z-index: 3;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex; /* Flexbox centering */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
  }
  #name-input, #room-name {
    font-size: 200%;
    width: 16em;
    height: 2em;
    padding: 0 1em;
    text-align: center;
    border: 1px solid #bbb;
    border-radius: 8px; /* Rounded corners */
    margin-bottom: 16px; /* Space below input */
    outline: none;
    background-color: #fff;
    transition: border-color 0.3s ease;
  }
  #name-input:focus, #room-name:focus {
    border-color: #007aff;
  }
  #room-form p {
    text-align: center;
    margin-bottom: 16px;
    font-size: 1.2em;
    color: #555;
  }
  #room-form button {
    font-size: inherit;
    border: 1px solid #bbb;
    background-color: #eee;
    height: 2em;
    padding: 0 1em;
    cursor: pointer;
    border-radius: 8px;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }
  #room-form button:hover {
    background-color: #ddd;
  }
  #room-form button:active {
    transform: scale(0.98);
  }

  /* Responsive Adjustments for Mobile */
  @media(max-width:600px) {
    #roster {
      display: none; /* Hide roster on small screens */
      width: 0; /* Ensures chatlog expands fully */
    }
    #chatlog {
      right: 0; /* Chat log takes full width */
    }
    #name-input, #room-name {
      font-size: 150%;
      width: 100%;
      max-width: 300px;
    }
    #name-form, #room-form {
      font-size: 100%;
    }
    #room-form button {
      font-size: 1em;
      width: auto;
    }
    #room-name {
      font-size: 1em;
    }
  }

  /* Adjustments for smaller screens (e.g., small mobile phones) */
  @media(max-width:400px) {
    #chatlog { padding: 8px; }
    #chat-input { padding-left: 8px; }
    #chatroom::before { display: none; } /* Remove prompt icon for very small screens */
    #name-input, #room-name { font-size: 120%; }
  }

  /* Add some default styling for "You" in the roster */
  .roster-you {
    color: #ff5722;
    font-weight: 900;
  }
</style>

  </head>
  <body>
    <!-- Username Selection Form -->
    <form id="name-form" action="/fake-form-action">
      <input id="name-input" placeholder="your name">
      <p style="text-align:center; font-size: 0.8em; color: #888; margin-top: 24px;">
        This chat runs on <a href="https://blog.cloudflare.com/introducing-workers-durable-objects" target="_blank">Cloudflare Durable Objects</a>
      </p>
    </form>

    <!-- Room Selection Form -->
    <form id="room-form" action="/fake-form-action">
      <p>Enter a public room:</p>
      <input id="room-name" placeholder="room name"><button id="go-public">Go &raquo;</button>
      <p style="margin-top: 24px; margin-bottom: 24px;">OR</p>
      <button id="go-private">Create a Private Room &raquo;</button>
    </form>

    <!-- Main Chat Interface -->
    <form id="chatroom" action="/fake-form-action">
      <div id="chatlog">
        <div id="spacer"></div>
      </div>
      <div id="roster"></div>
      <input id="chat-input" placeholder="Type message here...">
    </form>
  </body>

<!--===================================================================================-->
<!-- Client-side JavaScript code for the app. -->

<script type="text/javascript">
let currentWebSocket = null;

let nameForm = document.querySelector("#name-form");
let nameInput = document.querySelector("#name-input");
let roomForm = document.querySelector("#room-form");
let roomNameInput = document.querySelector("#room-name");
let goPublicButton = document.querySelector("#go-public");
let goPrivateButton = document.querySelector("#go-private");
let chatroom = document.querySelector("#chatroom");
let chatlog = document.querySelector("#chatlog");
let chatInput = document.querySelector("#chat-input");
let roster = document.querySelector("#roster");

// Is the chatlog scrolled to the bottom?
let isAtBottom = true;

let username;
let roomname;

let hostname = window.location.host;
if (hostname == "") {
  // Probably testing the HTML locally.
  hostname = "edge-chat-demo.cloudflareworkers.com";
}

function startNameChooser() {
  // Support passing name via URL param ?name=foo or ?name=* (random)
  try {
    const params = new URLSearchParams(window.location.search);
    let urlName = params.get("name");
    if (urlName) {
      if (urlName === '*') {
        urlName = generateRandomName();
      } else {
        // Trim and enforce max length / basic normalization (server only enforces length)
        urlName = urlName.trim().slice(0, 32);
      }
      if (urlName.length > 0) {
        username = urlName;
        // Pre-fill so user sees chosen name if they navigate back somehow before removal.
        nameInput.value = username;
        startRoomChooser();
        return; // Skip manual entry UI.
      }
    }
  } catch (e) {
    // Ignore URL parsing errors and fall back to manual input.
  }

  nameForm.addEventListener("submit", event => {
    event.preventDefault();
    username = nameInput.value;
    if (username.length > 0) {
      startRoomChooser();
    }
  });

  nameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  nameInput.focus();
}

// Simple random name generator for when ?name=* is used.
function generateRandomName() {
  const adjectives = [
    'Brave','Calm','Swift','Merry','Bright','Clever','Lucky','Nimble','Quiet','Fuzzy',
    'Jolly','Rapid','Witty','Chill','Zesty','Cosmic','Sunny','Icy','Rusty','Bouncy'
  ];
  const nouns = [
    'Tiger','Panda','Falcon','Otter','Phoenix','Dragon','Koala','Lynx','Eagle','Wolf',
    'Dolphin','Badger','Puffin','Hawk','Panda','Raven','Lion','Gecko','Moose','Yak'
  ];
  const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  const noun = nouns[Math.floor(Math.random()*nouns.length)];
  let num = Math.floor(Math.random()*1000); // up to 3 digits
  let candidate = `${adj}${noun}${num}`;
  // Ensure <=32 chars; if too long drop number.
  if (candidate.length > 32) candidate = `${adj}${noun}`.slice(0,32);
  return candidate;
}

function startRoomChooser() {
  nameForm.remove();

  if (document.location.hash.length > 1) {
    roomname = document.location.hash.slice(1);
    startChat();
    return;
  }

  roomForm.addEventListener("submit", event => {
    event.preventDefault();
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  roomNameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  goPublicButton.addEventListener("click", event => {
    event.preventDefault(); // Added to ensure form submit behavior is handled by JS click event
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  goPrivateButton.addEventListener("click", async event => {
    event.preventDefault(); // Added to prevent form submission on button click

    // Disable buttons to prevent multiple clicks while fetching room name.
    roomNameInput.disabled = true;
    goPublicButton.disabled = true;
    event.currentTarget.disabled = true;

    // Fetch new private room name from API.
    let response = await fetch("https://" + hostname + "/api/room", {method: "POST"});
    if (!response.ok) {
      alert("something went wrong");
      document.location.reload();
      return;
    }

    roomname = await response.text();
    startChat();
  });

  roomNameInput.focus();
}

function startChat() {
  roomForm.remove();

  // Normalize the room name a bit.
  roomname = roomname.replace(/[^a-zA-Z0-9_-]/g, "").replace(/_/g, "-").toLowerCase();

  // Note: The logic below seems to check for a specific length (32) vs. 64.
  // The original comment says "length > 32 AND not match 64 char hex string".
  // Let's assume the intention is to check a maximum length unless it's a specific format.
  // The original check "roomname.length > 32 && !roomname.match(/^[0-9a-f]{64}$/)" seems a bit complex.
  // I will assume the server side logic handles the actual validation, and keep this client side check for consistency.
  if (roomname.length > 32 && !roomname.match(/^[0-9a-f]{64}$/)) {
    addChatMessage(null, "* ERROR: Invalid room name.");
    return;
  }

  document.location.hash = "#" + roomname;

  chatInput.addEventListener("keydown", event => {
    if (event.keyCode == 38) {
      // up arrow
      chatlog.scrollBy(0, -50);
    } else if (event.keyCode == 40) {
      // down arrow
      chatlog.scrollBy(0, 50);
    } else if (event.keyCode == 33) {
      // page up
      chatlog.scrollBy(0, -chatlog.clientHeight + 50);
    } else if (event.keyCode == 34) {
      // page down
      chatlog.scrollBy(0, chatlog.clientHeight - 50);
    }
  });

  chatroom.addEventListener("submit", event => {
    event.preventDefault();

    if (currentWebSocket) {
      // Check for empty message before sending
      if (chatInput.value.trim().length > 0) {
        currentWebSocket.send(JSON.stringify({message: chatInput.value}));
        chatInput.value = "";
        // Scroll to bottom whenever sending a message.
        chatlog.scrollBy(0, 1e8);
      }
    }
  });

  chatInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 256) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 256);
    }
  });

  chatlog.addEventListener("scroll", event => {
    isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight;
  });

  chatInput.focus();
  document.body.addEventListener("click", event => {
    // If the user clicked somewhere in the window without selecting any text, focus the chat
    // input.
    if (window.getSelection().toString() == "") {
      chatInput.focus();
    }
  });

  // Detect mobile keyboard appearing and disappearing, and adjust the scroll as appropriate.
  if('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function(event) {
      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    });
  }

  join();
}

let lastSeenTimestamp = 0;
let wroteWelcomeMessages = false;

function join() {
  // If we are running via wrangler dev, use ws:
  const wss = document.location.protocol === "http:" ? "ws://" : "wss://";
  let ws = new WebSocket(wss + hostname + "/api/room/" + roomname + "/websocket");
  let rejoined = false;
  let startTime = Date.now();

  let rejoin = async () => {
    if (!rejoined) {
      rejoined = true;
      currentWebSocket = null;

      // Clear the roster.
      while (roster.firstChild) {
        roster.removeChild(roster.firstChild);
      }

      // Don't try to reconnect too rapidly.
      let timeSinceLastJoin = Date.now() - startTime;
      if (timeSinceLastJoin < 10000) {
        // Less than 10 seconds elapsed since last join. Pause a bit.
        await new Promise(resolve => setTimeout(resolve, 10000 - timeSinceLastJoin));
      }

      // OK, reconnect now!
      join();
    }
  }

  ws.addEventListener("open", event => {
    currentWebSocket = ws;

    // Send user info message.
  const params = new URLSearchParams(window.location.search);
  const noLimit = params.get('limit') === '0';
  ws.send(JSON.stringify({name: username, noLimit}));
  });

  ws.addEventListener("message", event => {
    let data = JSON.parse(event.data);

    if (data.error) {
      addChatMessage(null, "* Error: " + data.error);
    } else if (data.joined) {
      let p = document.createElement("p");
      p.innerText = data.joined;
      roster.appendChild(p);
    } else if (data.quit) {
      for (let child of roster.childNodes) {
        if (child.innerText == data.quit) {
          roster.removeChild(child);
          break;
        }
      }
    } else if (data.ready) {
      // All pre-join messages have been delivered.
      if (!wroteWelcomeMessages) {
        wroteWelcomeMessages = true;

        // Add welcome messages (reformatted for better appearance)
        if (roomname.length == 64) {
          addChatMessage(null, "* This is a private room. You can invite someone by sharing the URL.");
        } else {
          addChatMessage(null, "* Welcome to #" + roomname + ". chat.fcic.cc");
        }

        // After roster and backlog ready, highlight self in roster.
        highlightOwnName();
        // Support URL param msg= to send a first message automatically; msg=* -> fetch last message.
        try {
          const params = new URLSearchParams(window.location.search);
          const autoMsg = params.get('msg');
          if (autoMsg) {
            if (autoMsg === '*') {
              // Fetch last message via new /last endpoint and append (no send)
              fetch(`https://${hostname}/api/room/${roomname}/last`).then(r=> r.status===200? r.json(): null).then(j=>{
                if (j && j.message) {
                  addChatMessage(j.name, j.message);
                }
              }).catch(()=>{});
            } else if (currentWebSocket) {
              currentWebSocket.send(JSON.stringify({message: autoMsg.slice(0,256)}));
            }
          }
        } catch(e) {}
      }
    } else {
      // A regular chat message.
      if (data.timestamp > lastSeenTimestamp) {
  const isoTs = new Date(data.timestamp).toISOString();
  addChatMessage(data.name, data.message, isoTs);
        lastSeenTimestamp = data.timestamp;
        if (data.joined === username) highlightOwnName();
      }
    }
  });

  ws.addEventListener("close", event => {
    console.log("WebSocket closed, reconnecting:", event.code, event.reason);
    rejoin();
  });
  ws.addEventListener("error", event => {
    console.log("WebSocket error, reconnecting:", event);
    rejoin();
  });
}

function addChatMessage(name, text, isoTs) {
  let p = document.createElement("p");
  const ts = isoTs ? new Date(isoTs) : new Date();

  // Format timestamp (e.g., "HH:MM")
  const timePart = ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (name) {
    let header = document.createElement("span");
    header.className = "username";
    header.innerText = `${name} (${timePart})`;
    p.appendChild(header);
    p.appendChild(document.createElement('br'));
  }

  const msgSpan = document.createElement('span');
  msgSpan.appendChild(linkify(text));
  p.appendChild(msgSpan);
  chatlog.appendChild(p);

  // Auto-scroll logic: only scroll if user hasn't scrolled up manually.
  if (isAtBottom) {
    chatlog.scrollBy(0, 1e8);
  }
}

function highlightOwnName() {
  for (let child of roster.childNodes) {
    if (child.innerText === username) {
      child.classList.add('roster-you');
    }
  }
}

function linkify(text) {
  const urlRegex = /(https?:\/\/[\w\-._~:/?#@!$&'()*+,;=%]+)/gi;
  const frag = document.createDocumentFragment();
  let lastIndex = 0; let match;
  while ((match = urlRegex.exec(text)) !== null) {
    if (match.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
    const a = document.createElement('a');
    a.href = match[0]; a.innerText = match[0]; a.target = '_blank'; a.rel='noopener noreferrer';
    frag.appendChild(a);
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
  return frag;
}

startNameChooser();
</script>
